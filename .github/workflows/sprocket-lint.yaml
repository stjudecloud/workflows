name: Workflows Sprocket Lint

on: [push]

jobs:
  sprocket_lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run 'sprocket lint'
      uses: stjude-rust-labs/sprocket-action@main
      with:
        lint: true
        except: KnownRules
        ignore-patterns: methylation
    - name: Run 'sprocket format'
      uses: stjude-rust-labs/sprocket-action@main
      with:
        action: format
