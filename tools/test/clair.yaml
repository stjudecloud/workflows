# The `clair3` task requires a `Directory model` input containing pre-trained neural network
# weights. The `hkubal/clair3:v2.0.0` container ships built-in models at `/opt/models/`.
# Tests use the bundled Illumina model at `/opt/models/ilmn` (absolute in-container path).
clair3:
  - name: works
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      model:
        - /opt/models/ilmn

  - name: with_vcf_candidates
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      model:
        - /opt/models/ilmn
      vcf_candidates:
        - vcfs/test1.vcf.gz

  - name: gvcf_mode
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      model:
        - /opt/models/ilmn
      gvcf:
        - true

  - name: all_contigs
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      model:
        - /opt/models/ilmn
      all_contigs:
        - true

  - name: print_ref_calls
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      model:
        - /opt/models/ilmn
      print_ref_calls:
        - true

