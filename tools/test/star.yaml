build_star_db:
  - name: works
    tags: [reference, slow, high_mem]
    inputs:
      $ref:
        reference_fasta:
          - reference/GRCh38.chr9_chr22.fa.gz
          - reference/GRCh38.chrY_chrM.fa
        gtf:
          - reference/gencode.v31.chr9_chr22.gtf.gz
          - reference/gencode.v31.chrY_chrM.gtf.gz
      genome_chr_bin_n_bits:
        - 18
        - 10
      genome_SA_index_n_bases:
        - 14
        - 10
      genome_SA_sparse_d:
        - 1
        - 5
      genome_suffix_length_max:
        - -1
        - 250
      sjdb_overhang:
        - 100
        - 125
alignment:
  # TODO: test **all** options :'(
  - name: works
    tags: [slow]
    inputs:
      runtime.memory:
        - "10 GB"
      ncpu:
        - 4
      star_db_tar_gz:
        - reference/star_db.chrY_chrM.tar.gz
      $samples:
        read_one_fastqs_gz:
          - [fastqs/test_R1.fq.gz]
          - [fastqs/test_R1.fq.gz, fastqs/random10k.r1.fq.gz]
          - [fastqs/test_R2.fq.gz]
          - [fastqs/test_R2.fq.gz, fastqs/random10k.r2.fq.gz]
        read_two_fastqs_gz:
          - [fastqs/test_R2.fq.gz]
          - [fastqs/test_R2.fq.gz, fastqs/random10k.r2.fq.gz]
          - []
          - null
        read_groups:
          - ["ID:test"]
          - ["ID:test PU:flowcell1.lane1 SM:sample1", "ID:random10k PU:flowcell1.lane1 SM:sample1"]
          - ["ID:test SM:sample1 PL:ILLUMINA"]
          - ["ID:test PU:flowcell1.lane1 SM:sample1", "ID:random10k PU:flowcell1.lane1 SM:sample1"]
