manta_germline:
  - name: works
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai

  - name: exome_mode
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      exome:
        - true

