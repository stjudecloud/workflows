        - WES
      threads:
        - 2

  - name: runtime_report
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      runtime_report:
        - true
      threads:
          - 2

  - name: vcf_stats_report
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
          - bams/test.bwa_aln_pe.chrY_chrM.bam
        bam_index:
          - bams/test.bwa_aln_pe.chrY_chrM.bam.bai
      vcf_stats_report:
        - true
      threads:
          - 2

  - name: custom_haploid_chromosomes
    tags: [slow]
    inputs:
      $reference:
        reference_fasta:
          - reference/GRCh38.chrY_chrM.fa
        reference_fasta_index:
          - reference/GRCh38.chrY_chrM.fa.fai
      $sample:
        bam:
